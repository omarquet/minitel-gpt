<!doctype html>
<meta charset="utf-8">
<title>Conversation Gemini Minitel</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 24px 12px;
    background: radial-gradient(ellipse at top, #3a3a3d, #1c1c1e 70%);
    color: #d9ffd9; font-family: ui-monospace, "Courier New", monospace;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  /* Barre d'outils de test (n'existe pas sur un vrai Minitel) */
  .devbar {
    width: 100%; max-width: 560px; display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; padding: 8px 10px; background: #111214;
    border: 1px solid #2c2c30; border-radius: 8px; font-size: 12px;
  }
  .devbar input {
    flex: 1; min-width: 120px; background: #000; color: #8eff9b;
    border: 1px solid #2d5f39; border-radius: 4px; padding: 6px 8px;
    font-family: inherit; font-size: 12px;
  }
  .devbar button {
    background: #232326; color: #ccc; border: 1px solid #3a3a3e;
    border-radius: 4px; padding: 6px 10px; cursor: pointer;
    font-family: inherit; font-size: 12px;
  }
  .devbar button:disabled { opacity: .4; cursor: default; }
  .status { color: #8eff9b; white-space: nowrap; }

  /* Le boitier Minitel : plastique beige, coins arrondis */
  .minitel {
    width: 100%; max-width: 520px; background: linear-gradient(#e4dcc6, #d3c8a8);
    border-radius: 18px; padding: 16px 16px 20px; box-shadow: 0 12px 30px rgba(0,0,0,.5);
    border: 1px solid #b8ab84;
  }
  .brand {
    display: flex; justify-content: space-between; align-items: baseline;
    color: #6b5f42; font-size: 11px; letter-spacing: .12em; padding: 0 4px 8px;
    font-family: Georgia, serif;
  }
  .brand b { font-size: 13px; letter-spacing: .2em; }

  /* L'ecran, encadre par un bezel sombre facon tube cathodique */
  .bezel {
    background: #17140f; border-radius: 10px; padding: 10px;
    box-shadow: inset 0 0 0 2px #060503, inset 0 0 18px rgba(0,0,0,.8);
  }
  .screen {
    position: relative; overflow: hidden;
    background: #05130a; color: #d9ffd9; border-radius: 3px; padding: 12px;
    min-height: 380px; white-space: pre-wrap; line-height: 1.25;
    font-size: 14px; box-shadow: inset 0 0 40px rgba(0,0,0,.6);
  }
  .screen::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.12) 3px),
                radial-gradient(ellipse at center, rgba(255,255,255,.05), rgba(0,0,0,.35) 85%);
  }

  /* Bandeau clavier : zone de saisie + touches de fonction */
  .keyboard { margin-top: 14px; padding: 12px; background: #cabe9c; border-radius: 10px;
    border: 1px solid #b0a37e; box-shadow: inset 0 1px 0 rgba(255,255,255,.4); }
  .typeslot { display: flex; gap: 6px; margin-bottom: 10px; }
  .typeslot input {
    flex: 1; background: #0b0b0b; color: #d9ffd9; border: 1px solid #443b26;
    border-radius: 5px; padding: 9px 10px; font-family: inherit; font-size: 14px;
  }
  .fnkeys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .fk {
    border: none; border-radius: 6px;
    padding: 9px 6px; font-family: inherit; font-size: 11px; font-weight: bold;
    letter-spacing: .03em; cursor: pointer; color: #1b1b1b;
    box-shadow: 0 2px 0 rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.35);
  }
  .fk:active { box-shadow: 0 0px 0 rgba(0,0,0,.35); transform: translateY(2px); }
  .fk:disabled { opacity: .5; cursor: default; }
  .fk-grey   { background: #b9b2a0; }
  .fk-blue   { background: #7fa8c9; }
  .fk-orange { background: #e0a85c; }
  .fk-green  { background: #6ec27a; }
</style>

<div class="devbar">
  <input id="wsUrl" placeholder="wss://mondomaine.fr/ws" />
  <input id="wsToken" placeholder="token (si WS_TOKEN configuré)" style="flex:0 0 160px" />
  <button id="connectBtn">Connecter</button>
  <button id="disconnectBtn" disabled>Déconnecter</button>
  <button id="clearBtn">Effacer</button>
  <span class="status" id="status">deconnecte</span>
</div>

<div class="minitel">
  <div class="brand"><b>Minitel</b><span>1B</span></div>
  <div class="bezel">
    <div class="screen" id="screen">Connexion au service Minitel…</div>
  </div>
  <div class="keyboard">
    <div class="typeslot">
      <input id="message" placeholder="Tapez votre message (ENTREE = ENVOI)" />
      <button id="sendBtn" class="fk fk-green" style="flex:0 0 90px">Envoi</button>
    </div>
    <div class="fnkeys" id="fnButtons">
      <button data-fn="0x46" class="fk fk-grey">Sommaire</button>
      <button data-fn="0x45" class="fk fk-grey">Annulation</button>
      <button data-fn="0x42" class="fk fk-grey">Retour</button>
      <button data-fn="0x47" class="fk fk-grey">Correction</button>
      <button data-fn="0x43" class="fk fk-grey">Répétition</button>
      <button data-fn="0x44" class="fk fk-blue">Guide</button>
      <button data-fn="0x48" class="fk fk-orange">Suite</button>
      <button data-fn="0x41" class="fk fk-green">Envoi</button>
    </div>
  </div>
</div>

<script>
  const COLS = 40, ROWS = 25;
  const PALETTE = ["#000", "#f55", "#3f6", "#fd4", "#59f", "#f6f", "#4ee", "#eee"];
  const screenEl = document.getElementById('screen');
  const statusEl = document.getElementById('status');
  const messageInput = document.getElementById('message');
  const connectBtn = document.getElementById('connectBtn');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const wsUrlInput = document.getElementById('wsUrl');
  const wsTokenInput = document.getElementById('wsToken');
  wsUrlInput.value = location.protocol === 'file:'
    ? 'ws://127.0.0.1:8080/ws'
    : `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
  const SEP = 0x13;
  const K_SOMMAIRE = 0x46;
  const K_SUITE = 0x48;
  const K_ENVOI = 0x41;
  const K_GUIDE = 0x44;
  const K_RETOUR = 0x42;
  const K_CORRECTION = 0x47;
  const K_ANNULATION = 0x45;
  const K_REPETITION = 0x43;
  let ws = null;
  let grid = [];
  let curColor = 7;
  let curSize = 'normal';
  let cr = 0;
  let cc = 0;
  let esc = false;

  const disconnectBtn = document.getElementById('disconnectBtn');
  const fnButtons = document.getElementById('fnButtons');

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function updateButtonState() {
    const open = ws && ws.readyState === WebSocket.OPEN;
    disconnectBtn.disabled = !open;
    for (const button of fnButtons.querySelectorAll('button')) {
      button.disabled = !open;
    }
    connectBtn.disabled = open;
    const locked = open || (ws && ws.readyState === WebSocket.CONNECTING);
    wsUrlInput.disabled = locked;
    wsTokenInput.disabled = locked;
  }

  function initGrid() {
    grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => ({ ch: ' ', col: 7, size: 'normal' })));
    curColor = 7;
    curSize = 'normal';
    cr = 0;
    cc = 0;
    esc = false;
  }

  const ESCAPE_MAP = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
  function escapeHtml(ch) {
    return ESCAPE_MAP[ch] || ch;
  }

  // Approximation visuelle : le vrai Minitel etale un caractere double
  // hauteur sur 2 lignes physiques ; ici on se contente d'un scale() CSS
  // (peut chevaucher la ligne suivante), suffisant pour verifier que le
  // LLM utilise bien la mise en forme.
  const SIZE_TRANSFORM = {
    normal: '', height: 'scaleY(2)', width: 'scaleX(2)', both: 'scale(2)',
  };

  function render() {
    let html = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = grid[r][c];
        const ch = cell.ch === ' ' ? ' ' : escapeHtml(cell.ch);
        const transform = SIZE_TRANSFORM[cell.size] || '';
        const style = `color:${PALETTE[cell.col]}` +
          (transform ? `;display:inline-block;transform:${transform};transform-origin:left` : '');
        html += `<span style="${style}">${ch}</span>`;
      }
      html += '\n';
    }
    screenEl.innerHTML = html;
  }

  function scrollUp() {
    grid.shift();
    grid.push(Array.from({ length: COLS }, () => ({ ch: ' ', col: 7, size: 'normal' })));
  }

  function putChar(ch) {
    if (cc >= COLS) { cc = 0; cr++; }
    if (cr >= ROWS) { scrollUp(); cr = ROWS - 1; }
    grid[cr][cc] = { ch, col: curColor, size: curSize };
    cc++;
  }

  const SIZE_MAP = { 0x4C: 'normal', 0x4D: 'height', 0x4E: 'width', 0x4F: 'both' };

  function feed(bytes) {
    for (const b of bytes) {
      if (esc) {
        esc = false;
        if (b >= 0x40 && b <= 0x47) curColor = b - 0x40;
        else if (b in SIZE_MAP) curSize = SIZE_MAP[b];
        continue;
      }
      switch (b) {
        case 0x1B: esc = true; break;
        case 0x0C: initGrid(); break;
        case 0x1E: cr = 0; cc = 0; break;
        case 0x0D: cc = 0; break;
        case 0x0A: cr++; if (cr >= ROWS) { scrollUp(); cr = ROWS - 1; } break;
        case 0x08: cc = Math.max(0, cc - 1); break;
        default:
          if (b >= 0x20 && b <= 0x7E) putChar(String.fromCharCode(b));
      }
    }
    render();
  }

  function clearScreen() {
    initGrid();
    render();
  }

  function buildWsUrl() {
    const base = wsUrlInput.value.trim();
    const token = wsTokenInput.value.trim();
    if (!token) return base;
    return base + (base.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token);
  }

  function connectNow() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      return;
    }
    if (!wsUrlInput.value.trim()) {
      setStatus('erreur: URL manquante');
      return;
    }
    clearScreen();
    feed([0x0C, 0x1E]);
    feed('=== TERMINAL MINITEL ==='.split('').map(c => c.charCodeAt(0)));
    feed([0x0D, 0x0A]);
    feed('Connexion au serveur…'.split('').map(c => c.charCodeAt(0)));
    setStatus('connexion…');
    const url = buildWsUrl();
    ws = new WebSocket(url);
    wsUrlInput.disabled = true;
    wsTokenInput.disabled = true;
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => {
      setStatus('connecte');
      updateButtonState();
    };
    ws.onmessage = (event) => {
      const data = typeof event.data === 'string' ? new TextEncoder().encode(event.data) : new Uint8Array(event.data);
      feed(data);
    };
    ws.onerror = () => {
      setStatus('erreur');
      feed([0x0D, 0x0A]);
      feed('ERREUR DE TRANSPORT'.split('').map(c => c.charCodeAt(0)));
    };
    ws.onclose = () => {
      setStatus('deconnecte');
      feed([0x0D, 0x0A]);
      feed('DECONNECTE'.split('').map(c => c.charCodeAt(0)));
      ws = null;
      updateButtonState();
    };
  }

  function sendFn(code) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      return;
    }
    ws.send(new Uint8Array([SEP, code]));
  }

  function disconnectNow() {
    if (!ws) return;
    ws.close();
    ws = null;
    updateButtonState();
  }

  function sendNow() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      feed([0x0D, 0x0A]);
      feed('ERREUR: pas de connexion'.split('').map(c => c.charCodeAt(0)));
      return;
    }
    const text = messageInput.value.trim();
    if (!text) return;
    feed([0x0D, 0x0A]);
    feed(text.split('').map(c => c.charCodeAt(0)));
    ws.send(text + '\r');
    messageInput.value = '';
  }

  connectBtn.addEventListener('click', connectNow);
  disconnectBtn.addEventListener('click', disconnectNow);
  sendBtn.addEventListener('click', sendNow);
  clearBtn.addEventListener('click', clearScreen);
  fnButtons.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const fn = btn.dataset.fn && parseInt(btn.dataset.fn, 16);
    if (fn) {
      sendFn(fn);
    }
  });
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      sendNow();
      e.preventDefault();
    }
  });
  wsUrlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      connectNow();
      e.preventDefault();
    }
  });
  initGrid();
  render();
  connectNow();
</script>
